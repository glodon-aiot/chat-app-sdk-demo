name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Main: build production (base /chat-app-sdk-demo/ for GitHub Pages)
      - name: Build production
        if: github.ref == 'refs/heads/main'
        run: npm run build
        env:
          NODE_ENV: production
          VITE_BASE_PATH: '/chat-app-sdk-demo/'

      # Main: save prod build to cache for develop to merge later
      - name: Cache production build
        if: github.ref == 'refs/heads/main'
        uses: actions/cache/save@v4
        with:
          path: dist
          key: prod-build

      # Main: 恢复上次 develop 部署的 combined（保留 /test/），与当前 prod 合并后再部署，避免生产部署覆盖测试环境
      - name: Restore combined from develop (for preserving /test/)
        if: github.ref == 'refs/heads/main'
        uses: actions/cache/restore@v4
        with:
          path: combined-cache
          key: combined-from-develop
        continue-on-error: true

      # Main: 合并当前生产构建 + 保留的 test 目录，使部署同时包含 / 和 /test/
      - name: Merge production with preserved test (main)
        if: github.ref == 'refs/heads/main'
        run: |
          mkdir -p combined
          cp -r dist/. combined/
          if [ -d combined-cache/test ] && [ "$(ls -A combined-cache/test 2>/dev/null)" ]; then
            cp -r combined-cache/test combined/
          fi

      # Develop: restore prod build from cache
      - name: Restore production build cache
        if: github.ref == 'refs/heads/develop'
        uses: actions/cache/restore@v4
        with:
          path: dist
          key: prod-build
        continue-on-error: true

      # Develop: build test (base /chat-app-sdk-demo/test/, output to dist-test)
      - name: Build test
        if: github.ref == 'refs/heads/develop'
        run: npm run build
        env:
          NODE_ENV: production
          VITE_BASE_PATH: '/chat-app-sdk-demo/test/'
          VITE_OUT_DIR: dist-test

      # Develop: merge prod (from cache) + test into combined for deployment
      - name: Merge prod and test builds
        if: github.ref == 'refs/heads/develop'
        run: |
          mkdir -p combined/test
          if [ -d dist ] && [ "$(ls -A dist 2>/dev/null)" ]; then
            cp -r dist/* combined/
          else
            # 无 prod 缓存时：根目录放重定向页，引导到 /test/
            echo '<!DOCTYPE html><html><head><meta charset="UTF-8"><meta http-equiv="refresh" content="0;url=./test/"></head><body><p>Redirecting to <a href="./test/">test</a>...</p></body></html>' > combined/index.html
          fi
          cp -r dist-test/. combined/test/

      # Develop: 保存 combined 供下次 main 部署时保留 /test/
      - name: Cache combined (for main to preserve test)
        if: github.ref == 'refs/heads/develop'
        uses: actions/cache/save@v4
        with:
          path: combined
          key: combined-from-develop

      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          enablement: true

      - name: Upload artifact (production)
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: './combined'

      - name: Upload artifact (test + production merged)
        if: github.ref == 'refs/heads/develop'
        uses: actions/upload-pages-artifact@v3
        with:
          path: './combined'

  deploy:
    # 不同环境对应不同访问 URL：main -> 站点根；develop -> 站点根/test/
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'github-pages' || 'test' }}
      url: ${{ github.ref == 'refs/heads/main' && steps.deployment.outputs.page_url || format('{0}test/', steps.deployment.outputs.page_url) }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
